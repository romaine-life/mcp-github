# SA used by both containers. kube-rbac-proxy uses this SA's token to
# call TokenReview on incoming bearer tokens (granted via the
# system:auth-delegator binding in templates/auth-delegator.yaml).
# No workload-identity annotation — github-mcp doesn't talk to Azure.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-github
  namespace: mcp-github
