# Syncs GitHub App credentials from KV. These KV keys are pre-existing and
# managed out-of-band with the GitHub Apps.
#
# The verbose remoteRef blocks are intentional: ESO defaults them at admission,
# and ArgoCD's server-side diff sees the defaults as drift without explicit
# values.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-github-config
  namespace: mcp-github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: mcp-github-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: github-app-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GITHUB_APP_INSTALLATION_ID
      remoteRef:
        key: github-app-installation-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GITHUB_APP_PRIVATE_KEY
      remoteRef:
        key: github-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: TANK_OPERATOR_APP_ID
      remoteRef:
        key: tank-operator-app-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: TANK_OPERATOR_APP_PRIVATE_KEY
      remoteRef:
        key: tank-operator-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
