# Syncs GitHub App credentials from the app-owned Key Vault. These keys are
# managed out-of-band with the GitHub Apps.
#
# The verbose remoteRef blocks are intentional: ESO defaults them at admission,
# and ArgoCD's server-side diff sees the defaults as drift without explicit
# values.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-github-config
  namespace: mcp-github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: mcp-github-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Host identity = org-owned `romaine-life-host` App (installed on the
    # romaine-life org), replacing nelsong6's personal `romaine-life-app`.
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: romaine-life-host-app-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GITHUB_APP_INSTALLATION_ID
      remoteRef:
        key: romaine-life-host-app-installation-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GITHUB_APP_PRIVATE_KEY
      remoteRef:
        key: romaine-life-host-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: TANK_OPERATOR_APP_ID
      remoteRef:
        key: tank-operator-app-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: TANK_OPERATOR_APP_PRIVATE_KEY
      remoteRef:
        key: tank-operator-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
