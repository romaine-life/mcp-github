# Syncs the shared GitHub App credentials from KV. These KV keys
# (github-app-id / github-app-installation-id / github-app-private-key)
# are pre-existing — set up out-of-band when the App was registered;
# not managed by tofu since the App itself isn't either.
#
# The verbose remoteRef blocks are intentional: ESO defaults them at
# admission, and ArgoCD's server-side diff sees the defaults as drift
# without explicit values, self-healing in a loop.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-github-config
  namespace: mcp-github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: mcp-github-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: github-app-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GITHUB_APP_INSTALLATION_ID
      remoteRef:
        key: github-app-installation-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GITHUB_APP_PRIVATE_KEY
      remoteRef:
        key: github-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    # User-facing tank-operator-romaine-life App credentials (#57 stage 3).
    # The App identity is constant; per-user installation_ids come from the
    # orchestrator's /api/internal/resolve-caller. Absence of these keys
    # cleanly degrades the server to host-minter-for-everyone (logged at
    # boot), which matches pre-stage-3 behavior — useful during the chart
    # upgrade window when the new ExternalSecret entries haven't synced
    # yet, and on dev clusters that haven't seeded the App credentials.
    - secretKey: TANK_OPERATOR_APP_ID
      remoteRef:
        key: tank-operator-app-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: TANK_OPERATOR_APP_PRIVATE_KEY
      remoteRef:
        key: tank-operator-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
