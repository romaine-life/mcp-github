# Same pattern as mcp-azure: synthetic resource (mcp.tank-operator.io/servers
# named "github") gates SubjectAccessReview, ClusterRole + RoleBinding
# names allowed callers explicitly.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-rbac-proxy
  namespace: mcp-github
data:
  config.yaml: |
    authorization:
      resourceAttributes:
        apiGroup: mcp.tank-operator.io
        resource: servers
        name: github
        namespace: mcp-github
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-github-invoker
rules:
  - apiGroups: ["mcp.tank-operator.io"]
    resources: ["servers"]
    resourceNames: ["github"]
    # GET (SSE) + POST (JSON-RPC) — kube-rbac-proxy auto-derives the
    # verb from the HTTP method.
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-github-invoker
  namespace: mcp-github
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-github-invoker
subjects:
  - kind: ServiceAccount
    name: claude-session
    namespace: tank-operator-sessions
