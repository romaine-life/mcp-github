apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-github
  namespace: mcp-github
spec:
  replicas: 1
  # Same reason as mcp-azure: single-node cluster can't fit two replicas during
  # a rolling-update surge. Recreate keeps the rollout unstuck.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcp-github
  template:
    metadata:
      labels:
        app: mcp-github
    spec:
      serviceAccountName: mcp-github
      containers:
        - name: mcp-github
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: upstream
              containerPort: {{ .Values.upstreamPort }}
          envFrom:
            # GITHUB_APP_* (host romaine-life-app) and TANK_OPERATOR_APP_*
            # (user-facing tank-operator-romaine-life) synced from KV by
            # ExternalSecret. Per-caller routing in #57 stage 3 picks
            # which to use per request.
            - secretRef:
                name: mcp-github-config
          env:
            - name: PORT
              value: "{{ .Values.upstreamPort }}"
            # Orchestrator endpoint for per-caller resolution
            # (#57 stage 3). In-cluster Service URL — no TLS,
            # no cross-namespace ingress. Override per slot if the
            # orchestrator runs in a non-default namespace.
            - name: ORCHESTRATOR_INTERNAL_URL
              value: "{{ .Values.orchestratorUrl }}"
            - name: ORCHESTRATOR_INTERNAL_URLS
              value: "{{ join "," .Values.orchestratorUrls }}"
            # Audience-scoped SA token for calling the orchestrator's
            # /api/internal/* endpoints. A dedicated projected token
            # with audience "tank-operator" is mounted separately from
            # the default SA token (which kube-rbac-proxy uses for its
            # own TokenReview). The orchestrator validates this audience
            # so a token minted for any other audience is rejected even
            # if the SA name matches the allowlist.
            - name: TANK_OPERATOR_SA_TOKEN_PATH
              value: /var/run/secrets/tank-operator/token
          volumeMounts:
            - name: tank-operator-sa-token
              mountPath: /var/run/secrets/tank-operator
              readOnly: true
          readinessProbe:
            # Server binds 127.0.0.1 (loopback only) — exec probe runs
            # inside the container's netns so localhost resolves.
            exec:
              command: ["python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', {{ .Values.upstreamPort }})); s.close()"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        - name: kube-rbac-proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          args:
            - --insecure-listen-address=0.0.0.0:{{ .Values.proxy.port }}
            - --upstream=http://127.0.0.1:{{ .Values.upstreamPort }}/
            - --config-file=/etc/kube-rbac-proxy/config.yaml
            - --v=2
          ports:
            - name: proxy
              containerPort: {{ .Values.proxy.port }}
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/kube-rbac-proxy
              readOnly: true
          resources:
            {{- toYaml .Values.proxyResources | nindent 12 }}
      volumes:
        - name: proxy-config
          configMap:
            name: kube-rbac-proxy
        # Projected SA token with audience "tank-operator" used when
        # calling the orchestrator's /api/internal/* endpoints. Separate
        # from the default SA token so the kube-rbac-proxy's own
        # TokenReview (which accepts any audience) is unaffected.
        - name: tank-operator-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: tank-operator
                  expirationSeconds: 3600
                  path: token
