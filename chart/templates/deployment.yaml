apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-github
  namespace: mcp-github
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcp-github
  template:
    metadata:
      labels:
        app: mcp-github
    spec:
      serviceAccountName: mcp-github
      containers:
        - name: mcp-github
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          envFrom:
            - secretRef:
                name: mcp-github-config
          env:
            - name: PORT
              value: "{{ .Values.port }}"
            - name: AUTH_ROMAINE_LIFE_ISSUER
              value: "{{ .Values.authRomaineLife.issuer }}"
            - name: AUTH_ROMAINE_LIFE_JWKS_URL
              value: "{{ .Values.authRomaineLife.jwksUrl }}"
            - name: TANK_OPERATOR_INSTALLATION_URL
              value: "{{ .Values.tankOperator.installationUrl }}"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
