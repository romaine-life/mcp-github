# ============================================================================
# mcp-github values
# ============================================================================
# GitHub App credentials (App ID, installation ID, private key) come from
# pre-existing KV secrets via ExternalSecret. No Azure UAMI involved —
# this server has no Azure surface, only talks to api.github.com.

image:
  repository: romainecr.azurecr.io/mcp-github
  # SHA-pinned. .github/workflows/build.yml rewrites this tag on every push to main
  # via a `[skip ci]` follow-up commit. Quoted so all-digit short-SHAs don't
  # become floats — see reference_yaml_tag_quoting.md.
  tag: "449fe59"
  pullPolicy: IfNotPresent

# Loopback-only port the Python uvicorn server listens on.
upstreamPort: 8080

proxy:
  image:
    repository: quay.io/brancz/kube-rbac-proxy
    tag: v0.18.2
    pullPolicy: IfNotPresent
  port: 8443

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

proxyResources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

# Orchestrator endpoint mcp-github calls for per-caller resolution
# (#57 stage 3). In-cluster Service URL — no TLS, no ingress hop.
# Overridden in per-slot value overlays where the orchestrator runs in
# a different namespace.
orchestratorUrl: http://tank-operator.tank-operator.svc:80
orchestratorUrls:
  - http://tank-operator.tank-operator.svc:80
  - http://tank-operator.tank-operator-slot-1.svc:80
  - http://tank-operator.tank-operator-slot-2.svc:80
  - http://tank-operator.tank-operator-slot-3.svc:80
  - http://tank-operator.tank-operator-slot-4.svc:80
  - http://tank-operator.tank-operator-slot-5.svc:80
  - http://tank-operator.tank-operator-slot-6.svc:80
  - http://tank-operator.tank-operator-slot-7.svc:80
  - http://tank-operator.tank-operator-slot-8.svc:80
  - http://tank-operator.tank-operator-slot-9.svc:80
  - http://tank-operator.tank-operator-slot-10.svc:80
