# ============================================================================
# mcp-github values
# ============================================================================
# GitHub App credentials come from the app-owned Key Vault via ExternalSecret.
# Incoming caller identity comes from an auth.romaine.life-issued role=service JWT;
# installation_id is resolved at request time via tank-operator's
# /api/internal/github/installation endpoint.

image:
  repository: romainecr.azurecr.io/mcp-github
  tag: "de6f0c5"
  pullPolicy: IfNotPresent

port: 8080

tankOperator:
  internalUrl: http://tank-operator.tank-operator.svc.cluster.local
  # Resolves caller's email → {installation_id, is_host, is_super_admin}.
  # mcp-github forwards the caller's inbound auth.romaine.life JWT as
  # Bearer, so the lookup is scoped to the caller's own actor_email
  # (tightening the surface vs. an open lookup).
  installationUrl: http://tank-operator.tank-operator.svc.cluster.local/api/internal/github/installation

authRomaineLife:
  issuer: https://auth.romaine.life
  jwksUrl: https://auth.romaine.life/api/auth/jwks

externalSecret:
  storeName: ng6-mcp-github
  storeKind: ClusterSecretStore
  vaultUrl: https://ng6-mcp-github.vault.azure.net/

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

observability:
  enabled: true
  scrapeInterval: 30s
